{{define "sidebar"}}
<nav id="sidebar"
     x-show="showSidebar"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="-translate-x-full lg:translate-x-0"
     x-transition:enter-end="translate-x-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="translate-x-0"
     x-transition:leave-end="-translate-x-full lg:translate-x-0"
     @click.away="if (window.innerWidth < 1024) showSidebar = false"
     class="w-52 bg-panel border-r border-edge flex flex-col fixed lg:static inset-y-0 left-0 z-40 lg:z-0 transform lg:transform-none"
     x-cloak
     :class="{'lg:flex': true}">
    <div class="flex-1 py-4 mt-14 lg:mt-0 space-y-1">
        <a href="{{.BasePath}}/" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-sm text-ink-light hover:bg-edge-light transition-colors {{if eq .ActiveNav "overview"}}bg-accent-light text-accent{{end}}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span>Overview</span>
        </a>
        <a href="{{.BasePath}}/runs" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-sm text-ink-light hover:bg-edge-light transition-colors {{if eq .ActiveNav "runs"}}bg-accent-light text-accent{{end}}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5l5 5v11a2 2 0 01-2 2z"/>
            </svg>
            <span>Runs</span>
        </a>
        <a href="{{.BasePath}}/workflows" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-sm text-ink-light hover:bg-edge-light transition-colors {{if eq .ActiveNav "workflows"}}bg-accent-light text-accent{{end}}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
            <span>Workflows</span>
        </a>
        <a href="{{.BasePath}}/approvals" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-sm text-ink-light hover:bg-edge-light transition-colors {{if eq .ActiveNav "approvals"}}bg-accent-light text-accent{{end}}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-3-9a9 9 0 110 18 9 9 0 010-18z"/>
            </svg>
            <span>Approvals</span>
            {{if gt .PendingApprovals 0}}
            <span class="ml-auto text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">{{.PendingApprovals}}</span>
            {{end}}
        </a>
        <a href="{{.BasePath}}/learnings" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-sm text-ink-light hover:bg-edge-light transition-colors {{if eq .ActiveNav "learnings"}}bg-accent-light text-accent{{end}}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            <span>Learnings</span>
        </a>
    </div>
</nav>
{{end}}
