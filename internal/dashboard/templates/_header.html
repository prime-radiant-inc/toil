{{define "header"}}
<header class="bg-white border-b border-edge px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <button @click="showSidebar = !showSidebar" class="lg:hidden p-2 hover:bg-edge-light rounded-lg transition-colors">
            <svg class="w-5 h-5 text-ink-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <a href="{{.BasePath}}/" class="font-display text-lg font-medium italic text-ink">Toil</a>
        <span class="section-label hidden sm:inline">Agent Orchestrator</span>
    </div>
    <div class="flex items-center gap-4 text-sm text-muted">
        <span>Workflows {{.WorkflowCount}}</span>
        <span>Runs {{.RunCount}}</span>
        {{if gt .PendingApprovals 0}}
        <a href="{{.BasePath}}/approvals" class="flex items-center gap-1.5 px-2 py-1 rounded-lg bg-amber-50 border border-amber-200 text-amber-700 text-xs font-medium hover:bg-amber-100 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {{.PendingApprovals}} pending
        </a>
        {{else}}
        <span>Approvals {{.PendingApprovals}}</span>
        {{end}}
    </div>
</header>
{{end}}
