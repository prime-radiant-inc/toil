{{define "node-detail-skipped"}}
<div data-node-detail-kind="skipped" class="p-3 space-y-3">
    <div class="flex items-center gap-2 flex-wrap">
        <span class="px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wide bg-gray-100 text-gray-600">skipped</span>
        <span class="text-sm text-muted">Decision: <span class="font-medium text-ink-light">{{.Decision}}</span></span>
        {{if not .Timestamp.IsZero}}<span class="text-xs text-muted">at {{.Timestamp.Local.Format "15:04:05"}}</span>{{end}}
    </div>
    {{if .Prompt}}
    <div>
        <div class="text-[10px] font-semibold uppercase tracking-wide text-muted mb-1">Prompt that would have run</div>
        <div class="transcript-item-content">{{renderMarkdown .Prompt}}</div>
    </div>
    {{end}}
</div>
{{end}}
